<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AVT & LRF 타겟 트래킹 시뮬레이터</title>
    <link rel="stylesheet" href="../static/css/prj2.css">
</head>
<body>

    <h1>🦅 AVT(영상추적) & LRF(레이저측정) 서보 루프 시뮬레이터</h1>

    <div class="container">
        <!-- 카메라 스크린 영역 -->
        <div class="panel view-panel">
            <canvas id="cameraScreen" width="600" height="450"></canvas>
            <p class="instruction">💡 <b>화면을 마우스로 클릭</b>하면 새 떼(표적)가 해당 위치로 기습 이동하여 오차가 발생합니다.</p>
        </div>

        <!-- 제어 및 수치 모니터링 영역 -->
        <div class="panel control-panel">
            <h2>🎛️ 제어 및 파라미터 제어</h2>
            
            <div class="slider-group">
                <div class="slider-label">
                    <span>모터 추적 속도 (P 제어 이득)</span>
                    <span id="pGainVal">0.05</span>
                </div>
                <input type="range" id="pGain" min="0.01" max="0.3" step="0.01" value="0.05">
            </div>

            <div class="slider-group">
                <div class="slider-label">
                    <span>조류 비행 기류 노이즈 (난기류)</span>
                    <span id="noiseVal">2</span>
                </div>
                <input type="range" id="noise" min="0" max="10" step="1" value="2">
            </div>

            <div class="slider-group">
                <div class="slider-label">
                    <span>헬기-표적 기본 고도차 (m)</span>
                    <span id="baseAltVal">300</span>
                </div>
                <input type="range" id="baseAlt" min="50" max="1000" step="50" value="300">
            </div>

            <hr style="border-color: #374151; margin: 10px 0;">

            <h2>📊 실시간 데이터 연산 모니터 (Python 백엔드 추정값)</h2>
            <div class="status-grid">
                <div class="status-item">화면 오차 ΔX<br><span id="errorX" class="status-val">0 px</span></div>
                <div class="status-item">화면 오차 ΔY<br><span id="errorY" class="status-val">0 px</span></div>
                <div class="status-item">서보 모터 상태<br><span id="motorStatus" class="status-val">대기 중</span></div>
                <div class="status-item">LRF 레이저 조준<br><span id="lrfStatus" style="color:var(--error-color);" class="status-val">OFF</span></div>
                <div class="status-item">LRF 최종 측정 거리<br><span id="lrfDist" class="status-val">- m</span></div>
                <div class="status-item">조류 계산 고도<br><span id="calcAlt" class="status-val">- m</span></div>
            </div>

            <button class="btn" id="toggleTracking">자동 추적(AVT) 시작</button>
            <button class="btn btn-orange" id="triggerIntrusion">새 떼 돌발 방향 전환 예시</button>
        </div>
    </div>

    <script src="../static/js/prj2.js"></script>
</body>
</html>
