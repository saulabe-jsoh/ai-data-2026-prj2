{% extends "base.html" %}

{% block content %}
  <h1>{{ message }}</h1>
  <form action="/hello/" method="get" onsubmit="event.preventDefault(); location.href='/hello/'+encodeURIComponent(document.getElementById('name').value)">
    <input id="name" name="name" placeholder="이름을 입력하세요">
    <button type="submit">인사</button>
  </form>
{% endblock %}
